name: Announce

on:
  workflow_run:
    workflows: [Deploy]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      trigger_sha:
        description: 'Commit SHA to diff against its parent for new/published posts'
        required: true

jobs:
  announce:
    runs-on: ubuntu-latest
    # only run after a successful deploy, and not when the bot commits discussionUrl back
    if: |
      github.event_name == 'workflow_dispatch' || (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.actor.login != 'github-actions[bot]'
      )
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v7
        with:
          node-version: lts/*

      - name: Post to Bluesky / Mastodon
        id: announce
        run: node scripts/announce.mjs
        env:
          SITE_URL: https://jnutter.dev
          TRIGGER_SHA: ${{ github.event.inputs.trigger_sha || github.event.workflow_run.head_sha }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          MASTODON_INSTANCE: ${{ secrets.MASTODON_INSTANCE }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}

      # The commit above used GITHUB_TOKEN, which doesn't trigger Deploy's
      # `on: push`, so the live site would otherwise never pick up the
      # discussion URLs written back to frontmatter.
      - name: Trigger Deploy
        if: steps.announce.outputs.pushed == 'true'
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
